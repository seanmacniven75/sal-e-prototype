<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAL-E Research App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #ffffff; color: #1c1c1e; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        #phone-shell { width: 375px; height: 812px; border: 12px solid #111; border-radius: 50px; position: relative; overflow: hidden; margin: 20px auto; display: flex; flex-direction: column; background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .screen { display: none; height: 100%; flex-direction: column; padding: 40px 30px; overflow-y: auto; }
        .active { display: flex; }
        
        /* Layout Grids */
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; margin: auto 0; }
        .grid-1x2 { display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; gap: 15px; height: 100%; padding: 20px 0; }
        .grid-single { display: grid; grid-template-columns: 1fr; place-items: center; height: 100%; }

        .face-cell { background: #f8fafc; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; cursor: pointer; }
        .face-cell img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .fixation-cross { font-size: 70px; font-weight: 200; margin: auto; color: #000; }
        
        /* Teal Theme & Radio Styling */
        .text-teal { color: #14b8a6; }
        .btn-teal { background: #14b8a6; padding: 18px; border-radius: 14px; font-weight: 600; text-align: center; margin-top: 40px; margin-bottom: 20px; cursor: pointer; color: white; border: none; font-size: 16px; flex-shrink: 0; }
        .btn-teal:disabled { background: #ccf2ee; color: #5eead4; }

        .section-block { margin-bottom: 45px; } /* High spacing between groups */
        label.section-title { display: block; margin-bottom: 16px; font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.12em; }
        
        .radio-group { display: flex; flex-direction: column; gap: 12px; }
        .radio-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: #f8fafc; border-radius: 14px; border: 1px solid #e2e8f0; cursor: pointer; font-size: 15px; font-weight: 500; transition: border-color 0.2s; }
        .radio-item:has(input:checked) { border-color: #14b8a6; background: #f0fdfa; }
        .radio-item input { accent-color: #14b8a6; width: 18px; height: 18px; }
        
        input[type="number"] { width: 100%; background: #ffffff; padding: 12px; border-radius: 10px; border: 2px solid #14b8a6; margin-top: 10px; outline: none; font-weight: 600; color: #0d9488; }
        
        /* Hide scrollbar for aesthetics */
        .screen::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="phone-shell">
    <div id="screen-setup" class="screen active pt-16">
        <h1 class="text-4xl font-black mb-1 tracking-tight text-teal">SAL-E</h1>
        <p class="text-zinc-400 text-[10px] uppercase tracking-[0.2em] mb-12">Stimulus Configuration</p>
        
        <div class="section-block">
            <label class="section-title">Ethnicity</label>
            <div class="radio-group">
                <label class="radio-item"><input type="radio" name="race" value="white" checked> White (WF & WM)</label>
                <label class="radio-item"><input type="radio" name="race" value="black"> Black (BF & BM)</label>
            </div>
        </div>

        <div class="section-block">
            <label class="section-title">Presentation Mode</label>
            <div class="radio-group">
                <label class="radio-item"><input type="radio" name="layout" value="2x2" checked> 2x2 Grid (16 trials)</label>
                <label class="radio-item"><input type="radio" name="layout" value="1x2"> 1x2 Portrait (32 trials)</label>
                <label class="radio-item"><input type="radio" name="layout" value="single"> Single Face (64 trials)</label>
            </div>
        </div>

        <div class="section-block">
            <label class="section-title">Trial Duration</label>
            <div class="radio-group">
                <label class="radio-item"><input type="radio" name="dur" value="3000"> 3 Seconds</label>
                <label class="radio-item"><input type="radio" name="dur" value="4000"> 4 Seconds</label>
                <label class="radio-item"><input type="radio" name="dur" value="5000" checked> 5 Seconds</label>
                <label class="radio-item">
                    <input type="radio" name="dur" value="custom" id="custom-radio"> User Defined
                </label>
                <input type="number" id="custom-dur-input" placeholder="Milliseconds (e.g. 7000)" style="display:none">
            </div>
        </div>
        
        <button id="start-btn" onclick="startStudy()" class="btn-teal" disabled>Loading Data...</button>
    </div>

    <div id="screen-fixation" class="screen justify-center items-center"><div class="fixation-cross">+</div></div>
    <div id="screen-trial" class="screen">
        <div id="progress" class="text-center text-[10px] text-zinc-400 font-bold mb-6 tracking-widest uppercase">Trial</div>
        <div id="face-grid-container" class="flex-grow flex flex-col justify-center"></div>
    </div>
    <div id="screen-done" class="screen justify-center items-center text-center">
        <h2 class="text-2xl font-bold mb-6">Block Complete</h2>
        <button onclick="location.reload()" class="text-teal font-bold border-2 border-teal/20 px-10 py-4 rounded-full">New Session</button>
    </div>
</div>

<script>
    let manifest = null;
    let trialQueue = [];
    let currentTrialIdx = 0;
    let results = [];
    let trialStartTime;
    let autoTimer;

    // Monitor radio changes for custom duration
    document.querySelectorAll('input[name="dur"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const customInput = document.getElementById('custom-dur-input');
            customInput.style.display = (e.target.value === 'custom') ? 'block' : 'none';
        });
    });

    async function init() {
        try {
            const resp = await fetch(`manifest.json?v=${Date.now()}`);
            manifest = await resp.json();
            const btn = document.getElementById('start-btn');
            btn.disabled = false;
            btn.innerText = "Start Session";
        } catch (e) { console.error("Manifest load failed"); }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startStudy() {
        if (!manifest) return;

        const race = document.querySelector('input[name="race"]:checked').value;
        const layout = document.querySelector('input[name="layout"]:checked').value;
        
        let folders = (race === 'white') ? 
            [...manifest.WF.map(id => `WF/${id}`), ...manifest.WM.map(id => `WM/${id}`)] : 
            [...manifest.BF.map(id => `BF/${id}`), ...manifest.BM.map(id => `BM/${id}`)];

        trialQueue = [];

        if (layout === '2x2') {
            shuffle(folders).forEach(path => trialQueue.push({ path, emotions: shuffle(['NC', 'AO', 'SC', 'FC']), layout: 'grid-2x2' }));
        } else if (layout === '1x2') {
            folders.forEach(path => {
                let emos = shuffle(['NC', 'AO', 'SC', 'FC']);
                trialQueue.push({ path, emotions: [emos[0], emos[1]], layout: 'grid-1x2' });
                trialQueue.push({ path, emotions: [emos[2], emos[3]], layout: 'grid-1x2' });
            });
            shuffle(trialQueue);
        } else if (layout === 'single') {
            folders.forEach(path => ['NC', 'AO', 'SC', 'FC'].forEach(e => trialQueue.push({ path, emotions: [e], layout: 'grid-single' })));
            shuffle(trialQueue);
        }

        currentTrialIdx = 0;
        results = [];
        runTrialCycle();
    }

    function runTrialCycle() {
        if (currentTrialIdx >= trialQueue.length) {
            console.table(results);
            showScreen('screen-done');
            return;
        }

        document.getElementById('progress').innerText = `TRIAL ${currentTrialIdx + 1} / ${trialQueue.length}`;
        showScreen('screen-fixation');

        setTimeout(() => {
            renderTrial();
            showScreen('screen-trial');
            trialStartTime = performance.now();
            
            let dur = document.querySelector('input[name="dur"]:checked').value;
            if (dur === 'custom') {
                const customVal = parseInt(document.getElementById('custom-dur-input').value);
                dur = !isNaN(customVal) && customVal > 0 ? customVal : 5000;
            }
            
            autoTimer = setTimeout(() => { logTrial('timeout'); runTrialCycle(); }, parseInt(dur));
        }, 1500);
    }

    function renderTrial() {
        const container = document.getElementById('face-grid-container');
        const trial = trialQueue[currentTrialIdx];
        container.innerHTML = `<div id="face-grid" class="${trial.layout}"></div>`;
        const grid = document.getElementById('face-grid');
        trial.emotions.forEach(emo => {
            const cell = document.createElement('div');
            cell.className = "face-cell w-full aspect-square";
            cell.innerHTML = `<img src="${trial.path}/${emo}.jpg" onerror="this.style.opacity='0'">`;
            cell.onclick = () => { clearTimeout(autoTimer); logTrial(emo); runTrialCycle(); };
            grid.appendChild(cell);
        });
    }

    function logTrial(choice) {
        const t = trialQueue[currentTrialIdx];
        results.push({ 
            trial: currentTrialIdx+1, 
            id: t.path, 
            stimuli: t.emotions.join(','), 
            choice, 
            rt: (performance.now() - trialStartTime).toFixed(0) 
        });
        currentTrialIdx++;
    }

    init();
</script>
</body>
</html>
