<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAL-E Research App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #ffffff; color: #1c1c1e; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        #phone-shell { width: 375px; height: 812px; border: 12px solid #111; border-radius: 50px; position: relative; overflow: hidden; margin: 20px auto; display: flex; flex-direction: column; background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .screen { display: none; height: 100%; flex-direction: column; padding: 40px 30px; }
        .active { display: flex; }
        
        /* Layout Grids */
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; margin: auto 0; }
        .grid-1x2 { display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; gap: 15px; height: 100%; padding: 20px 0; }
        .grid-single { display: grid; grid-template-columns: 1fr; place-items: center; height: 100%; }

        .face-cell { background: #f8fafc; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; cursor: pointer; transition: transform 0.1s; }
        .face-cell:active { transform: scale(0.98); }
        .face-cell img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .fixation-cross { font-size: 70px; font-weight: 200; margin: auto; color: #000; }
        
        /* Teal Theme & Spacing */
        .btn-teal { background: #14b8a6; padding: 18px; border-radius: 14px; font-weight: 600; text-align: center; margin-top: auto; cursor: pointer; color: white; border: none; font-size: 16px; transition: background 0.2s; }
        .btn-teal:active { background: #0d9488; }
        .btn-teal:disabled { background: #ccf2ee; color: #5eead4; cursor: not-allowed; }

        label { display: block; margin-bottom: 8px; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        select, input[type=range] { width: 100%; background: #f8fafc; padding: 14px; border-radius: 12px; margin-bottom: 32px; border: 1px solid #e2e8f0; outline: none; appearance: none; }
        input[type=range] { accent-color: #14b8a6; height: 6px; margin-top: 8px; }
    </style>
</head>
<body>

<div id="phone-shell">
    <div id="screen-setup" class="screen active pt-16">
        <h1 class="text-4xl font-black mb-2 tracking-tight">SAL-E</h1>
        <p class="text-zinc-400 text-[10px] uppercase tracking-[0.2em] mb-12">Stimulus Configuration</p>
        
        <label>Ethnicity</label>
        <select id="race-select">
            <option value="white">WHITE (WF & WM)</option>
            <option value="black">BLACK (BF & BM)</option>
        </select>

        <label>Presentation Mode</label>
        <select id="layout-select">
            <option value="2x2">Option 1: 2x2 Grid (16 Trials)</option>
            <option value="1x2">Option 2: 1x2 Portrait (32 Trials)</option>
            <option value="single">Option 3: Single Face (64 Trials)</option>
        </select>

        <label>Duration: <span id="dur-label" class="text-teal-600">5</span>s</label>
        <input type="range" id="duration-slider" min="3000" max="10000" step="1000" value="5000" oninput="document.getElementById('dur-label').innerText = this.value/1000">
        
        <button id="start-btn" onclick="startStudy()" class="btn-teal" disabled>Loading Data...</button>
    </div>

    <div id="screen-fixation" class="screen justify-center items-center"><div class="fixation-cross">+</div></div>

    <div id="screen-trial" class="screen">
        <div id="progress" class="text-center text-[10px] text-zinc-400 font-bold mb-6 tracking-widest uppercase">Trial</div>
        <div id="face-grid-container" class="flex-grow flex flex-col justify-center"></div>
    </div>

    <div id="screen-done" class="screen justify-center items-center text-center">
        <h2 class="text-2xl font-bold mb-2">Block Complete</h2>
        <p class="text-zinc-500 text-sm mb-12">Session successfully recorded.</p>
        <button onclick="location.reload()" class="text-teal-600 font-bold border-2 border-teal-50 px-8 py-3 rounded-full">Restart Session</button>
    </div>
</div>

<script>
    let manifest = null;
    let trialQueue = [];
    let currentTrialIdx = 0;
    let results = [];
    let trialStartTime;
    let autoTimer;

    // Load data from manifest.json
    async function init() {
        try {
            const resp = await fetch(`manifest.json?v=${Date.now()}`);
            if (!resp.ok) throw new Error("Manifest not found");
            manifest = await resp.json();
            
            const btn = document.getElementById('start-btn');
            btn.disabled = false;
            btn.innerText = "Start Session";
        } catch (e) {
            document.getElementById('start-btn').innerText = "Manifest Error";
            console.error(e);
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startStudy() {
        if (!manifest) return;

        const race = document.getElementById('race-select').value;
        const layout = document.getElementById('layout-select').value;
        
        let folders = (race === 'white') ? 
            [...manifest.WF.map(id => `WF/${id}`), ...manifest.WM.map(id => `WM/${id}`)] : 
            [...manifest.BF.map(id => `BF/${id}`), ...manifest.BM.map(id => `BM/${id}`)];

        trialQueue = [];

        if (layout === '2x2') {
            shuffle(folders).forEach(path => {
                trialQueue.push({ path, emotions: shuffle(['NC', 'AO', 'SC', 'FC']), layout: 'grid-2x2' });
            });
        } 
        else if (layout === '1x2') {
            folders.forEach(path => {
                let emos = shuffle(['NC', 'AO', 'SC', 'FC']);
                trialQueue.push({ path, emotions: [emos[0], emos[1]], layout: 'grid-1x2' });
                trialQueue.push({ path, emotions: [emos[2], emos[3]], layout: 'grid-1x2' });
            });
            shuffle(trialQueue);
        } 
        else if (layout === 'single') {
            folders.forEach(path => {
                ['NC', 'AO', 'SC', 'FC'].forEach(e => {
                    trialQueue.push({ path, emotions: [e], layout: 'grid-single' });
                });
            });
            shuffle(trialQueue);
        }

        currentTrialIdx = 0;
        results = [];
        runTrialCycle();
    }

    function runTrialCycle() {
        if (currentTrialIdx >= trialQueue.length) {
            console.table(results);
            showScreen('screen-done');
            return;
        }

        document.getElementById('progress').innerText = `TRIAL ${currentTrialIdx + 1} / ${trialQueue.length}`;
        showScreen('screen-fixation');

        setTimeout(() => {
            renderTrial();
            showScreen('screen-trial');
            trialStartTime = performance.now();
            autoTimer = setTimeout(() => { logTrial('timeout'); runTrialCycle(); }, parseInt(document.getElementById('duration-slider').value));
        }, 1500);
    }

    function renderTrial() {
        const container = document.getElementById('face-grid-container');
        const trial = trialQueue[currentTrialIdx];
        container.innerHTML = `<div id="face-grid" class="${trial.layout}"></div>`;
        const grid = document.getElementById('face-grid');

        trial.emotions.forEach(emo => {
            const cell = document.createElement('div');
            cell.className = "face-cell w-full aspect-square";
            cell.innerHTML = `<img src="${trial.path}/${emo}.jpg" onerror="this.style.opacity='0'">`;
            cell.onclick = () => { clearTimeout(autoTimer); logTrial(emo); runTrialCycle(); };
            grid.appendChild(cell);
        });
    }

    function logTrial(choice) {
        const t = trialQueue[currentTrialIdx];
        results.push({ 
            trial: currentTrialIdx + 1, 
            id: t.path, 
            stimuli: t.emotions.join(','),
            choice: choice, 
            rt: (performance.now() - trialStartTime).toFixed(0) 
        });
        currentTrialIdx++;
    }

    init();
</script>
</body>
</html>
